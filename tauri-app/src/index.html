<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Wiki 助手</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="session-header">会话</div>
        <div class="session-item active">默认会话</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="title">Minecraft Wiki 助手</div>
          <div class="status" id="statusLabel">Ready</div>
          <button id="settingsBtn" class="btn">设置</button>
        </header>
        <div id="apiKeyNotice" class="api-key-notice hidden">
          ⚠ 尚未设置 API Key，
          <span id="apiKeyNoticeLink" class="api-key-link">点击这里前往设置</span>
        </div>
        <section class="chat" id="chatList"></section>

        <footer class="input-bar">
          <textarea id="inputArea" rows="1" placeholder="输入问题，Enter 发送，Shift+Enter 换行"></textarea>
          <button id="sendBtn" class="btn">发送</button>
        </footer>
      </main>
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-title">设置</div>
        <div class="form">
          <label>API Key</label>
          <input type="password" id="cfgApiKey" />

          <label>API Base</label>
          <input type="text" id="cfgApiBase" />

          <label>Model</label>
          <input type="text" id="cfgModel" />

          <label>缓存命中率</label>
          <input type="number" step="0.01" id="cfgCacheHit" />

          <label>input_hit / 百万</label>
          <input type="number" step="0.01" id="cfgInputHit" />

          <label>input_miss / 百万</label>
          <input type="number" step="0.01" id="cfgInputMiss" />

          <label>output / 百万</label>
          <input type="number" step="0.01" id="cfgOutput" />

          <label>字体大小</label>
          <input type="number" step="1" id="cfgFontSize" />
          <label>调试模式</label>
          <input type="checkbox" id="cfgDebugMode" />

          <label>日志</label>
          <button id="openLogDirBtn" class="btn">打开日志目录</button>
        </div>
        <div class="modal-actions">
          <button id="settingsCancel" class="btn ghost">取消</button>
          <button id="settingsSave" class="btn">保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
